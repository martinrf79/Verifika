name: tests

# Bateria de regresion offline. Corre en cada push y en cada pull request.
# Es el juez externo: un rojo aca no se mergea, y no depende de la palabra de
# nadie. El piso offline es Python puro, no llama a ningun modelo ni necesita
# credenciales de Google, asi que corre gratis en los runners de GitHub.
#
# Los tests 'vivo' (que llaman a DeepSeek) NO corren aca: el default de pytest
# los excluye (-m 'not vivo' en pyproject.toml). Se disparan a mano cuando toca.

on:
  push:
  pull_request:

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Correr tests offline (sin LLM, sin credenciales)
        run: pytest -v
